# Helix - Development Docker Compose
# Usage: docker compose -f docker-compose.dev.yml up --build
# Hot reload enabled for both backend (uvicorn --reload) and frontend (Vite dev server)

services:
  backend:
    build: .
    command: ["uvicorn", "api.web.app:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    env_file: .env
    environment:
      GENE_DATABASE_URL: "sqlite+aiosqlite:////app/data/helix.db"
      CORS_ORIGINS: "http://localhost:5173"
    volumes:
      - ./api:/app/api
      - db_data:/app/data
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  frontend:
    image: node:22-alpine
    working_dir: /app
    command: ["sh", "-c", "npm install && npm run dev -- --host 0.0.0.0"]
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    environment:
      CHOKIDAR_USEPOLLING: "true"
      VITE_DEV_API_TARGET: "http://backend:8000"
    depends_on:
      backend:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    profiles:
      - postgres
    environment:
      POSTGRES_DB: helix
      POSTGRES_USER: helix
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-helix_dev}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U helix -d helix"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  db_data:
  pgdata:
  frontend_node_modules:
